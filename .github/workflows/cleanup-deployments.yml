name: Cleanup Cloudflare Pages Deployments

on:
  push:
    branches: [main]

jobs:
  cleanup:
    runs-on: ubuntu-latest
    # Poczekaj chwilę żeby Cloudflare zdążył zarejestrować nowy deploy
    steps:
      - name: Wait for Cloudflare deployment
        run: sleep 60

      - name: Delete old deployments
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_PROJECT_NAME: ${{ secrets.CF_PROJECT_NAME }}
          KEEP: 2
        run: |
          # Pobierz listę deployów (posortowane od najnowszego)
          DEPLOYMENTS=$(curl -s \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/pages/projects/$CF_PROJECT_NAME/deployments?per_page=25" \
            | jq -r '.result[].id')

          # Pomiń pierwsze $KEEP deploye, resztę usuń
          echo "$DEPLOYMENTS" | tail -n +$((KEEP + 1)) | while read id; do
            echo "Usuwam deploy: $id"
            curl -s -X DELETE \
              -H "Authorization: Bearer $CF_API_TOKEN" \
              "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/pages/projects/$CF_PROJECT_NAME/deployments/$id?force=true"
          done
